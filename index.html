<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Instruction</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1f4d, #2b5fd9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      position: relative;
    }

    .top-section {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 70%;
      text-align: right;
    }

    .bottom-section {
      position: absolute;
      bottom: 180px;
      left: 20px;
      width: 70%;
      text-align: left;
    }

    .arrow {
      font-size: 90px;
      line-height: 1;
      animation: pulse 1.2s infinite;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    .instruction {
      font-size: 28px;
      font-weight: 700;
      margin-top: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    }

    .button-wrap {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .open-btn {
      background: #14f1c6;
      color: black;
      border: none;
      border-radius: 20px;
      padding: 18px 45px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(20, 241, 198, 0.35);
      animation: glow 1.5s infinite alternate;
    }

    .loader {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255,255,255,0.25);
      border-top: 6px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.12); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes spin {
      0% { transform: translateX(-50%) rotate(0deg); }
      100% { transform: translateX(-50%) rotate(360deg); }
    }

    @keyframes glow {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.05);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="top-section">
      <div class="arrow">↑</div>
      <div class="instruction" id="step1">Нажми на 3 точки</div>
    </div>

    <div class="bottom-section">
      <div class="arrow">↓</div>
      <div class="instruction" id="step2">Открой в браузере</div>
    </div>

    <div class="button-wrap">
      <button class="open-btn" onclick="goLink()" id="btnText">ОТКРЫТЬ</button>
    </div>

    <div class="loader"></div>
  </div>

  <script>
    const redirectUrl = "https://tone.affomelody.com/ggy9gB";

    function goLink() {
      window.location.href = redirectUrl;
    }

    const lang = navigator.language || navigator.userLanguage;

    if (lang.startsWith('en')) {
      document.getElementById('step1').innerText = 'Tap the three dots';
      document.getElementById('step2').innerText = 'Open in browser';
      document.getElementById('btnText').innerText = 'OPEN';
    }

    setTimeout(() => {
      window.location.href = redirectUrl;
    }, 8000);
  </script>

</body>
</html>
