<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instruction</title>
    <style>
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center; margin: 0; height: 100vh; overflow: hidden;
            background: linear-gradient(135deg, #4B0082, #0000FF); color: white;
            display: none; /* Скрываем контент до проверки браузера */
        }
        .arrow { color: white; position: fixed; font-size: 80px; animation: pulse 1.5s infinite; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .arrow-up { top: 10px; right: 20px; }
        .arrow-down { bottom: 35%; left: 20px; }
        .instruction { font-size: 24px; font-weight: bold; position: absolute; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); }
        .instruction-up { top: 100px; right: 20px; text-align: right; width: 70%; }
        .instruction-down { bottom: 45%; left: 20px; text-align: left; width: 70%; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div class="arrow arrow-up">↑</div>
    <div id="text-up" class="instruction instruction-up">Нажмите на 3 точки</div>
    <div class="arrow arrow-down">↓</div>
    <div id="text-down" class="instruction instruction-down">Нажмите "Открыть в браузере"</div>

    <script>
        const redirectUrl = "https://tone.affomelody.com/ggy9gB";
        const ua = navigator.userAgent || navigator.vendor || window.opera;

        // Проверка: это TikTok?
        const isTikTok = ua.includes('BytedanceWebview') || ua.includes('TikTok') || ua.includes('TTWebView');

        if (!isTikTok) {
            // Если НЕ ТикТок — сразу уходим на оффер
            window.location.href = redirectUrl;
        } else {
            // Если ТикТок — показываем инструкцию
            document.body.style.display = "block";
            
            // Простая локализация на JS
            const lang = navigator.language || navigator.userLanguage;
            if (!lang.startsWith('ru')) {
                document.getElementById('text-up').innerText = "Tap on the three dots";
                document.getElementById('text-down').innerText = "Tap 'Open in browser'";
            }
        }
    </script>
</body>
</html>
