<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Загрузка...</title>
    <style>
        /* Стили страницы с инструкцией */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #4B0082, #0000FF);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        /* Делаем всю страницу кликабельной ссылкой */
        .full-screen-link {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            text-decoration: none;
            color: inherit;
            z-index: 1000;
            display: none; /* Показываем только если мы в WebView */
        }

        .arrow {
            position: fixed;
            font-size: 80px;
            line-height: 1;
            animation: pulse 1.5s infinite;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.6);
        }

        .arrow-up { top: 10px; right: 15px; }
        .arrow-down { bottom: 120px; left: 20px; }

        .instruction {
            position: fixed;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            max-width: 70%;
        }

        .instruction-up { top: 90px; right: 15px; text-align: right; }
        .instruction-down { bottom: 210px; left: 20px; text-align: left; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Корректировка для iPhone */
        .is-ios .arrow-up { top: 15px; right: 25px; }
        .is-ios .instruction-up { top: 100px; }
    </style>
</head>
<body>

    <a href="https://samka.top/click?o=73&a=10325&tsource=7" class="full-screen-link" id="mainLink">
        <div class="arrow arrow-up">↑</div>
        <div id="txt-up" class="instruction instruction-up">Нажмите на 3 точки</div>

        <div class="arrow arrow-down">↓</div>
        <div id="txt-down" class="instruction instruction-down">Нажмите "Открыть в браузере"</div>
    </a>

    <script>
        const offerUrl = "https://samka.top/click?o=73&a=10325&tsource=7";

        const translations = {
            'en': { up: 'Tap on the three dots', down: 'Tap "Open in browser"' },
            'ru': { up: 'Нажмите на 3 точки', down: 'Нажмите "Открыть в браузере"' },
            'es': { up: 'Toca los tres puntos', down: 'Toca "Abrir en el navegador"' },
            'fr': { up: 'Appuyez sur les 3 points', down: 'Ouvrir dans le navigateur' }
        };

        const userLang = (navigator.language || navigator.userLanguage).substring(0, 2);
        const content = translations[userLang] || translations['en'];

        // Проверка: мы внутри приложения (TikTok/Instagram) или в обычном браузере?
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isWebView = ua.includes("BytedanceWebview") || ua.includes("Instagram") || ua.includes("FBAN") || ua.includes("FBAV");

        if (isWebView) {
            // МЫ ВНУТРИ ПРИЛОЖЕНИЯ: показываем инструкцию и делаем экран кликабельным
            document.getElementById('txt-up').innerText = content.up;
            document.getElementById('txt-down').innerText = content.down;
            document.getElementById('mainLink').style.display = 'block';
            
            // Детект iOS для правок верстки
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                document.body.classList.add('is-ios');
            }
        } else {
            // МЫ В ОБЫЧНОМ БРАУЗЕРЕ: мгновенный редирект на оффер
            window.location.replace(offerUrl);
        }
    </script>
</body>
</html>
